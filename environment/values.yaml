image:
  repository: registry.home/mirkodinc
  tag: latest
ingress:
  enabled: true
  className: nginx
  annotations:
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
    external-dns.alpha.kubernetes.io/target: tunnel.rojandinc.se
    nginx.ingress.kubernetes.io/enable-global-auth: "false"
  hosts:
    - host: mirko.rojandinc.se
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - secretName: mirko-tls
      hosts:
        - mirko.rojandinc.se
service:
  port: 80
resources:
  requests:
    cpu: 10m
    memory: 64Mi
autoscaling:
  enabled: false
